name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: pnpm/action-setup@0e279bb959325dab635dd2c09392533439d90093 # v6.0.8
        with:
          version: 11
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: "24"
          cache: pnpm
      - name: Install dependencies
        run: pnpm install
      - uses: scal-p-labs/scalp-action@859d44532d9c0812c2e98ec7b157d0ce52fde82b # v0.6.1
        with:
          pm: pnpm
          policy: .scalp/policy.json
          pr-context: ${{ github.event_name == 'pull_request' && 'fork' || 'internal' }}
      - name: Format check
        run: pnpm fmt:check
      - name: Lint
        run: pnpm lint
      - name: Type check
        run: pnpm types:check
